name: Publish crates (Homebrew)
description: Publish to Homebrew repository

inputs:
  live-run:
    required: true
  version:
    required: true
  repo:
    required: true
  formulae:
    required: true
  tap:
    required: true
  ssh-host:
    required: true
  ssh-host-url:
    required: true
  ssh-host-path:
    required: true
  ssh-private-key:
    required: true
  ssh-passphrase:
    required: true
  github-token:
    required: true

runs:
  using: node24
  main: ../dist/publish-crates-homebrew-main.mjs
