name: Create release branch
description: Create a release branch for the given version

inputs:
  version:
    required: false
  branch-suffix:
    required: false
  live-run:
    required: true
  dry-run-history-size:
    required: false
  repo:
    required: true
  branch:
    required: false
  github-token:
    required: true

outputs:
  version:
    description: Release number
  branch:
    description: Release branch

runs:
  using: node24
  main: ../dist/create-release-branch-main.mjs
